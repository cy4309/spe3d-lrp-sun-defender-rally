<!doctype html>
<!--
  Dev-only 生圖串接測試頁（不納入 LIFF 正式流程）。
  目前支援：ComfyUI proxy、Leonardo (Picbot)。
  預留擴充：ChatGPT / 其他 provider（可仿 switchProvider 新增）。
  使用方式：用瀏覽器直接開啟本檔，或透過靜態伺服器提供；預設 API_BASE_URL 見下方 script。
-->

<!-- env -->
<!-- // const API_BASE_URL = "https://picbot.spe3d.co/comfy-proxy";
const API_BASE_URL = "http://127.0.0.1:8080"; -->

<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圖片生成測試工具</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .container {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #333;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5em;
      }
      .upload-section {
        border: 3px dashed #667eea;
        border-radius: 10px;
        padding: 40px;
        text-align: center;
        margin-bottom: 20px;
        transition: all 0.3s ease;
      }
      .upload-section:hover {
        border-color: #764ba2;
        background-color: #f8f9ff;
      }
      .upload-section.dragover {
        border-color: #764ba2;
        background-color: #f0f0ff;
      }
      input[type="file"] {
        display: none;
      }
      .upload-btn {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1.1em;
        font-weight: bold;
        transition: transform 0.2s;
      }
      .upload-btn:hover {
        transform: translateY(-2px);
      }
      .generate-btn {
        background: linear-gradient(45deg, #56ab2f, #a8e6cf);
        color: white;
        padding: 15px 40px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1.2em;
        font-weight: bold;
        margin: 20px 0;
        width: 100%;
        transition: transform 0.2s;
      }
      .generate-btn:hover {
        transform: translateY(-2px);
      }
      .generate-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }
      .stop-btn {
        background: linear-gradient(45deg, #e74c3c, #c0392b);
        color: white;
        padding: 10px 25px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 1em;
        font-weight: bold;
        margin-top: 15px;
        transition: transform 0.2s;
      }
      .stop-btn:hover {
        transform: translateY(-2px);
      }
      .preview-section {
        display: flex;
        gap: 20px;
        margin-top: 30px;
      }
      .image-container {
        flex: 1;
        text-align: center;
      }
      .image-container h3 {
        color: #333;
        margin-bottom: 15px;
      }
      .image-preview {
        max-width: 100%;
        max-height: 400px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      .loading {
        display: none;
        text-align: center;
        padding: 20px;
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .error {
        background: #ffebee;
        color: #c62828;
        padding: 15px;
        border-radius: 5px;
        margin: 10px 0;
      }
      .success {
        background: #e8f5e8;
        color: #2e7d32;
        padding: 15px;
        border-radius: 5px;
        margin: 10px 0;
      }
      .info {
        background: #e3f2fd;
        color: #1565c0;
        padding: 15px;
        border-radius: 5px;
        margin: 10px 0;
      }
      .generated-images {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }
      .generated-image-item {
        text-align: center;
      }
      .generated-image-item img {
        width: 100%;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      .generated-image-item h4 {
        margin: 10px 0 5px 0;
        color: #333;
      }
      .provider-disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎨 AI圖片生成測試工具</h1>

      <div class="upload-section" id="uploadSection">
        <p>📸 拖拽圖片到這裡，或點擊按鈕選擇檔案</p>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">選擇圖片</button>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)" />
      </div>

      <div id="messageArea"></div>

      <!-- API 提供者選擇 -->
      <div style="margin: 20px 0; padding: 20px; border: 2px solid #667eea; border-radius: 10px; background-color: #f0f4ff">
        <label style="display: block; margin-bottom: 15px; font-weight: bold; color: #333; font-size: 18px"> 🔧 選擇 AI 提供者: </label>
        <div style="display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap">
          <label style="display: flex; align-items: center; cursor: pointer; font-size: 16px">
            <input type="radio" name="provider" value="comfyui" checked onchange="switchProvider('comfyui')" style="margin-right: 8px; width: 18px; height: 18px; cursor: pointer" />
            <span style="font-weight: 600">ComfyUI (本地)</span>
          </label>
          <label style="display: flex; align-items: center; cursor: pointer; font-size: 16px">
            <input type="radio" name="provider" value="leonardo" onchange="switchProvider('leonardo')" style="margin-right: 8px; width: 18px; height: 18px; cursor: pointer" />
            <span style="font-weight: 600">Leonardo (Picbot)</span>
          </label>
          <label class="provider-disabled" style="display: flex; align-items: center; font-size: 16px" title="尚未實作，預留 ChatGPT 生圖">
            <input type="radio" name="provider" value="chatgpt" disabled style="margin-right: 8px; width: 18px; height: 18px" />
            <span style="font-weight: 600">ChatGPT（預留）</span>
          </label>
        </div>
      </div>

      <!-- ComfyUI 樣式選擇 -->
      <div id="comfyuiStyleSection" style="margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 10px; background-color: #f9f9f9">
        <label for="styleInput" style="display: block; margin-bottom: 10px; font-weight: bold; color: #333"> 🎨 ComfyUI 樣式 (Style): </label>
        <input type="text" id="styleInput" value="20" placeholder="輸入樣式名稱或數字" style="width: 250px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px" />
        <span style="margin-left: 10px; color: #666; font-size: 14px">可輸入數字或字串</span>

        <div style="margin-top: 15px">
          <label style="display: block; margin-bottom: 8px; color: #666; font-size: 14px"> 快速選擇樣式： </label>
          <div style="display: flex; gap: 10px; flex-wrap: wrap">
            <button onclick="setStyle('休閒度假_女')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">休閒度假_女</button>
            <button onclick="setStyle('科技美妝_右男')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">科技美妝_右男</button>
            <button onclick="setStyle('科技美妝_右女')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">科技美妝_右女</button>
            <button onclick="setStyle('科技美妝_男')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">科技美妝_男</button>
            <button onclick="setStyle('科技美妝_女')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">科技美妝_女</button>
            <button onclick="setStyle('科技美妝_女1')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">科技美妝_女1</button>
            <button onclick="setStyle('都會風格_男')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">都會風格_男</button>
            <button onclick="setStyle('三有男')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">三有男</button>
            <button onclick="setStyle('三有女')" style="padding: 8px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">三有女</button>
          </div>
        </div>
      </div>

      <!-- Leonardo 樣式選擇 -->
      <div id="leonardoStyleSection" style="margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 10px; background-color: #f9f9f9; display: none">
        <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #333"> 🎨 Leonardo 樣式 (ImageToImageStyle): </label>
        <div style="margin-bottom: 10px">
          <span style="color: #666; font-size: 14px">當前選擇: </span>
          <span id="leonardoCurrentStyle" style="font-weight: bold; color: #667eea">PIXAR_ANIMATION_WOMAN (6)</span>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 15px">
          <button class="leonardo-style-btn" onclick="setLeonardoStyle(0, 'NONE', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">0 - NONE</button>
          <button class="leonardo-style-btn" onclick="setLeonardoStyle(1, 'STUDIO_GHIBLI', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">1 - 吉卜力工作室</button>
          <button class="leonardo-style-btn" onclick="setLeonardoStyle(2, 'FUTURISTIC_RETRO_CYBERPUNK', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">2 - 未來復古賽博朋克</button>
          <button class="leonardo-style-btn" onclick="setLeonardoStyle(3, 'PIXAR_ANIMATION', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">3 - 皮克斯動畫</button>
          <button class="leonardo-style-btn" onclick="setLeonardoStyle(4, 'PIXAR_ANIMATION_CYBERPUNK', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">4 - 皮克斯賽博朋克</button>
          <button class="leonardo-style-btn" onclick="setLeonardoStyle(5, 'PIXAR_ANIMATION_MAN', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">5 - 皮克斯男性</button>
          <button class="leonardo-style-btn active" onclick="setLeonardoStyle(6, 'PIXAR_ANIMATION_WOMAN', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #56ab2f, #a8e6cf); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; box-shadow: 0 0 10px rgba(86, 171, 47, 0.5)">6 - 皮克斯女性</button>
          <button class="leonardo-style-btn" onclick="setLeonardoStyle(7, 'PIXAR_ANIMATION_PEOPLE', event)" style="padding: 10px 16px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px">7 - 皮克斯人物</button>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generateImage()" disabled>🚀 開始生成圖片</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">AI正在生成圖片中，請稍候...</p>
        <button class="stop-btn" id="stopBtn" onclick="stopGeneration()" style="display: none">🛑 停止生成</button>
      </div>

      <div class="preview-section" id="previewSection" style="display: none">
        <div class="image-container">
          <h3>📷 原始圖片</h3>
          <img id="originalImage" class="image-preview" alt="原始圖片" />
        </div>
        <div class="image-container">
          <h3>✨ 生成結果</h3>
          <div id="generatedImages" class="generated-images"></div>
        </div>
      </div>
    </div>

    <script>
      let selectedImageBase64 = null;
      let currentProvider = "comfyui";
      let leonardoStyle = 6;
      // const API_BASE_URL = "https://picbot.spe3d.co/comfy-proxy";
      const API_BASE_URL = "http://127.0.0.1:8080";

      let currentAbortController = null;
      let generationTimer = null;
      let generationStartTime = null;

      const uploadSection = document.getElementById("uploadSection");

      uploadSection.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadSection.classList.add("dragover");
      });

      uploadSection.addEventListener("dragleave", () => {
        uploadSection.classList.remove("dragover");
      });

      uploadSection.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadSection.classList.remove("dragover");
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      function handleFileSelect(event) {
        const file = event.target.files[0];
        if (file) {
          handleFile(file);
        }
      }

      function handleFile(file) {
        if (!file.type.startsWith("image/")) {
          showMessage("請選擇圖片檔案！", "error");
          return;
        }

        if (file.size > 10 * 1024 * 1024) {
          showMessage("圖片檔案太大，請選擇小於10MB的圖片！", "error");
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          selectedImageBase64 = e.target.result.split(",")[1];

          document.getElementById("originalImage").src = e.target.result;
          document.getElementById("previewSection").style.display = "flex";
          document.getElementById("generateBtn").disabled = false;

          showMessage(`圖片載入成功：${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`, "success");
        };
        reader.readAsDataURL(file);
      }

      function startGenerationTimer() {
        updateTimerDisplay();
        generationTimer = setInterval(updateTimerDisplay, 1000);
      }

      function updateTimerDisplay() {
        if (generationStartTime) {
          const elapsed = Math.floor((Date.now() - generationStartTime) / 1000);
          document.getElementById("loadingText").textContent = `AI正在生成圖片中，已生成 ${elapsed} 秒...`;
        }
      }

      function stopGeneration() {
        if (currentAbortController) {
          currentAbortController.abort();
        }
        resetGenerationState();
      }

      function resetGenerationState() {
        if (generationTimer) {
          clearInterval(generationTimer);
          generationTimer = null;
        }

        document.getElementById("loading").style.display = "none";
        document.getElementById("generateBtn").disabled = false;
        document.getElementById("stopBtn").style.display = "none";
        document.getElementById("loadingText").textContent = "AI正在生成圖片中，請稍候...";

        currentAbortController = null;
        generationStartTime = null;
      }

      async function generateImage() {
        if (!selectedImageBase64) {
          showMessage("請先選擇圖片！", "error");
          return;
        }

        if (currentProvider === "comfyui") {
          await generateImageComfyUI();
        } else if (currentProvider === "leonardo") {
          await generateImageLeonardo();
        } else if (currentProvider === "chatgpt") {
          showMessage("ChatGPT 生圖尚未實作，請在 generateImageChatGPT() 接上 API。", "info");
        }
      }

      async function generateImageComfyUI() {
        const styleInput = document.getElementById("styleInput");
        const styleInputValue = styleInput.value.trim();
        const styleValue = isNaN(styleInputValue) ? styleInputValue : parseInt(styleInputValue);

        currentAbortController = new AbortController();
        generationStartTime = Date.now();

        document.getElementById("loading").style.display = "block";
        document.getElementById("generateBtn").disabled = true;
        document.getElementById("stopBtn").style.display = "inline-block";
        document.getElementById("generatedImages").innerHTML = "";

        startGenerationTimer();

        try {
          const requestBody = {
            imageBase64: selectedImageBase64,
            style: styleValue,
          };

          showMessage(`🚀 開始 ComfyUI 生成 (樣式: ${styleValue})...`, "info");

          const response = await fetch(`${API_BASE_URL}/api/v1/generate-image`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody),
            signal: currentAbortController.signal,
          });

          const result = await response.json();

          if (result.success) {
            const generationTime = Math.round((Date.now() - generationStartTime) / 1000);
            showMessage(`🎉 ComfyUI 圖片生成成功！生成ID: ${result.data.generateId} (耗時: ${generationTime}秒)`, "success");

            displayGeneratedImage(result.data.imageBase64, result.data.generateId);
            checkForMultipleImages(result.data.generateId);
          } else {
            showMessage(`❌ 生成失敗：${result.error}`, "error");
          }
        } catch (error) {
          if (error.name === "AbortError") {
            showMessage("🛑 生成已被用戶手動停止", "info");
          } else {
            showMessage(`🔥 請求失敗：${error.message}`, "error");
            console.error("Error:", error);
          }
        } finally {
          resetGenerationState();
        }
      }

      async function generateImageLeonardo() {
        generationStartTime = Date.now();

        document.getElementById("loading").style.display = "block";
        document.getElementById("generateBtn").disabled = true;
        document.getElementById("loadingText").textContent = "Leonardo AI 正在生成圖片中，請稍候...";
        document.getElementById("generatedImages").innerHTML = "";

        try {
          const requestBody = {
            imageBase64: selectedImageBase64,
            style: leonardoStyle,
          };

          showMessage(`🚀 開始 Leonardo 生成 (風格: ${leonardoStyle})...`, "info");

          const response = await fetch(`${API_BASE_URL}/api/v1/generate-image-leonardo`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody),
          });

          const result = await response.json();

          if (result.success) {
            const generationTime = Math.round((Date.now() - generationStartTime) / 1000);
            showMessage(`🎉 Leonardo 圖片生成成功！Product ID: ${result.data.productId} (耗時: ${generationTime}秒)`, "success");

            displayLeonardoImage(result.data.imageUrl, result.data.productId);
          } else {
            showMessage(`❌ Leonardo 生成失敗：${result.error}`, "error");
          }
        } catch (error) {
          showMessage(`🔥 Leonardo 請求失敗：${error.message}`, "error");
          console.error("Error:", error);
        } finally {
          document.getElementById("loading").style.display = "none";
          document.getElementById("generateBtn").disabled = false;
          document.getElementById("loadingText").textContent = "AI正在生成圖片中，請稍候...";
        }
      }

      function displayLeonardoImage(imageUrl, productId) {
        const container = document.getElementById("generatedImages");
        const imageElement = document.createElement("div");
        imageElement.className = "generated-image-item";
        imageElement.innerHTML = `
          <h4>Leonardo 生成結果</h4>
          <img src="${imageUrl}" alt="Leonardo 生成的圖片" onerror="this.style.display='none'; this.nextElementSibling.textContent='圖片載入失敗';">
          <p>Product ID: ${productId}</p>
          <p><a href="${imageUrl}" target="_blank">開啟完整圖片</a></p>
        `;
        container.appendChild(imageElement);
      }

      function displayGeneratedImage(base64Data, generateId) {
        const container = document.getElementById("generatedImages");
        const imageElement = document.createElement("div");
        imageElement.className = "generated-image-item";
        imageElement.innerHTML = `
          <h4>主要結果圖片</h4>
          <img src="data:image/jpeg;base64,${base64Data}" alt="生成的圖片">
          <p>ID: ${generateId}</p>
        `;
        container.appendChild(imageElement);
      }

      async function checkForMultipleImages(generateId) {
        showMessage("🔍 檢查是否有多張生成圖片...", "info");

        for (let i = 1; i <= 4; i++) {
          try {
            const imageUrl = `${API_BASE_URL}/files/generated-image/${generateId}-${i}.jpg`;
            const response = await fetch(imageUrl, { method: "HEAD" });

            if (response.ok) {
              displayServerImage(imageUrl, `圖片 ${i}`);
            }
          } catch (error) {
            console.log(`圖片 ${i} 不存在或無法存取`);
            break;
          }
        }
      }

      function displayServerImage(imageUrl, title) {
        const container = document.getElementById("generatedImages");
        const imageElement = document.createElement("div");
        imageElement.className = "generated-image-item";
        imageElement.innerHTML = `
          <h4>${title}</h4>
          <img src="${imageUrl}" alt="${title}" onerror="this.style.display='none'">
          <p><a href="${imageUrl}" target="_blank">下載</a></p>
        `;
        container.appendChild(imageElement);
      }

      function showMessage(message, type) {
        const messageArea = document.getElementById("messageArea");
        const messageDiv = document.createElement("div");
        messageDiv.className = type;
        messageDiv.textContent = message;

        messageArea.innerHTML = "";
        messageArea.appendChild(messageDiv);

        if (type === "success") {
          setTimeout(() => {
            messageDiv.remove();
          }, 5000);
        }
      }

      function setStyle(styleName) {
        document.getElementById("styleInput").value = styleName;
        showMessage(`已選擇 ComfyUI 樣式: ${styleName}`, "info");
      }

      function switchProvider(provider) {
        currentProvider = provider;

        const comfyuiSection = document.getElementById("comfyuiStyleSection");
        const leonardoSection = document.getElementById("leonardoStyleSection");

        if (provider === "comfyui") {
          comfyuiSection.style.display = "block";
          leonardoSection.style.display = "none";
          showMessage("已切換至 ComfyUI 提供者", "info");
        } else if (provider === "leonardo") {
          comfyuiSection.style.display = "none";
          leonardoSection.style.display = "block";
          showMessage("已切換至 Leonardo (Picbot) 提供者", "info");
        }
      }

      function setLeonardoStyle(styleNum, styleName, ev) {
        leonardoStyle = styleNum;
        document.getElementById("leonardoCurrentStyle").textContent = `${styleName} (${styleNum})`;

        document.querySelectorAll(".leonardo-style-btn").forEach((btn) => {
          btn.style.background = "linear-gradient(45deg, #667eea, #764ba2)";
          btn.style.boxShadow = "none";
        });
        if (ev && ev.target) {
          ev.target.style.background = "linear-gradient(45deg, #56ab2f, #a8e6cf)";
          ev.target.style.boxShadow = "0 0 10px rgba(86, 171, 47, 0.5)";
        }

        showMessage(`已選擇 Leonardo 風格: ${styleName} (${styleNum})`, "info");
      }
    </script>
  </body>
</html>
